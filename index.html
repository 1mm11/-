<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CC 2: Counter Cat</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #e94560; --bg: #1a1a2e; --panel: #16213e; --accent: #0f3460; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: sans-serif; color: white; touch-action: none; }

        /* Слои */
        #gameCanvas { position: absolute; top: 0; left: 0; z-index: 1; width: 100%; height: 100%; }
        #ui-layer { position: absolute; top: 0; left: 0; z-index: 10; width: 100%; height: 100%; pointer-events: none; }
        .interactive { pointer-events: auto; cursor: pointer; }

        /* Верхняя панель */
        #top-bar { position: absolute; top: 0; width: 100%; padding: 10px 20px; background: rgba(0,0,0,0.8); display: flex; justify-content: space-between; align-items: center; z-index: 20; }
        .stats-group { display: flex; flex-direction: column; font-size: 16px; }
        #elo-display { color: #f9a826; font-weight: bold; text-decoration: underline; }

        /* Экраны меню */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .hidden { display: none !important; }

        /* Кнопки */
        .btn { width: 85%; padding: 20px; margin: 10px 0; background: var(--accent); color: white; border: none; border-radius: 12px; font-size: 20px; font-weight: bold; box-shadow: 0 6px #05162d; transition: 0.1s; }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px #05162d; }
        .btn-main { background: var(--primary); box-shadow: 0 6px #a02d40; }

        /* Магазин/Выбор */
        #shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; margin-bottom: 20px; max-height: 60vh; overflow-y: auto; padding: 10px; }
        .fighter-card { background: var(--panel); padding: 15px 5px; border-radius: 10px; text-align: center; border: 3px solid transparent; transition: 0.2s; }
        .fighter-card.active { border-color: var(--primary); background: rgba(233, 69, 96, 0.2); }

        /* Игровые элементы */
        #ability-btn { position: absolute; bottom: 40px; right: 20px; width: 90px; height: 90px; background: var(--primary); border-radius: 50%; border: 4px solid white; display: flex; align-items: center; justify-content: center; font-size: 35px; z-index: 50; box-shadow: 0 0 20px rgba(233,69,96,0.6); }
        #ability-btn.cooldown { background: #555; filter: grayscale(1); box-shadow: none; border-color: #888; }
        #score-view { position: absolute; top: 50%; width: 100%; text-align: center; font-size: 70px; font-weight: 900; opacity: 0.15; transform: translateY(-50%); }
        #blind-fx { position: absolute; top:0; left:0; width:100%; height:100%; background:black; opacity:0; pointer-events:none; z-index: 200; transition: opacity 0.2s;}
    </style>
</head>
<body>

    <div id="blind-fx"></div>

    <div id="ui-layer" class="hidden">
        <div id="top-bar" class="interactive">
            <div class="stats-group">
                <b id="ui-nick">Игрок</b>
                <span>💰 <span id="ui-coins">0</span></span>
            </div>
            <div class="stats-group" style="align-items: flex-end;">
                <span>ELO</span>
                <span id="elo-display">0</span>
            </div>
        </div>

        <div id="score-view">0 : 0</div>
        <div id="ability-btn" class="interactive">⚡</div>
    </div>

    <div id="screen-auth" class="screen">
        <h1 style="margin-bottom: 30px; font-size: 40px; color: var(--primary);">CC 2</h1>
        <input type="text" id="nick-in" placeholder="Введи никнейм" class="interactive" style="width:80%; padding:15px; border-radius:10px; border:none; margin-bottom:20px; text-align:center; font-size:20px; outline: none;">
        <button class="btn btn-main interactive" id="btn-do-login">Играть!</button>
    </div>

    <div id="screen-menu" class="screen hidden">
        <h2 style="margin-bottom:20px; font-size:36px; color:var(--primary)">Меню</h2>
        <button class="btn btn-main interactive" id="btn-train">Тренировка (Бот)</button>
        <button class="btn interactive" id="btn-online">Онлайн 1x1</button>
        <button class="btn interactive" id="btn-shop">Выбрать кота</button>
    </div>

    <div id="screen-shop" class="screen hidden">
        <h3 style="margin-bottom: 15px; font-size: 24px;">Бойцы</h3>
        <div id="shop-grid" class="interactive"></div>
        <button class="btn btn-main interactive" id="btn-shop-back" style="width: 90%;">В меню</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    // 1. ИНИЦИАЛИЗАЦИЯ FIREBASE (Надёжный способ без модулей)
    const firebaseConfig = {
        apiKey: "AIzaSyCuXDgwCpLzJl_i6NIgwhA1nanVzTs7fnM",
        authDomain: "three-cats-online.firebaseapp.com",
        projectId: "three-cats-online",
        storageBucket: "three-cats-online.firebasestorage.app",
        messagingSenderId: "1965511705",
        appId: "1:1965511705:web:86a405ef672ae7bfa18688"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. ДАННЫЕ И СОСТОЯНИЕ
    let user = { nick: "", elo: 0, coins: 0, fighter: "Коржик" };
    let state = 'AUTH'; // AUTH, MENU, SHOP, PLAY
    let mode = 'train';
    let score = { p: 0, o: 0 };
    let abilityCD = false;

    const fighters = [
        { name: "Коржик", desc: "Слизь (Скольжение)" },
        { name: "Сажик", desc: "Туман (Отброс)" },
        { name: "Гоня", desc: "Взрыв (Оглушение)" },
        { name: "Карамелька", desc: "Леденец (Липкость)" },
        { name: "Шуруп", desc: "Робот (Выстрел)" },
        { name: "Изюм", desc: "Краска (Замедление)" },
        { name: "Горчица", desc: "Хот-дог (Темнота)" },
        { name: "Компот", desc: "Кастрюля (Взрыв)" }
    ];

    // ФИЗИКА
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const puck = { x: 0, y: 0, vx: 0, vy: 0, r: 15 };
    const p1 = { x: 0, y: 0, r: 35, stunned: 0, slow: 1 };
    const p2 = { x: 0, y: 0, r: 35, stunned: 0, slow: 1 };

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        puck.x = canvas.width/2; puck.y = canvas.height/2;
        p1.x = canvas.width/2; p1.y = canvas.height - 100;
        p2.x = canvas.width/2; p2.y = 100;
    }
    window.addEventListener('resize', resize);
    resize();

    // 3. ПРИВЯЗКА КНОПОК
    // Логин
    document.getElementById('btn-do-login').addEventListener('click', async () => {
        const nick = document.getElementById('nick-in').value.trim();
        if (!nick) { alert("Введи никнейм!"); return; }
        
        try {
            const snapshot = await db.ref(`users/${nick}`).once('value');
            if (snapshot.exists()) {
                user = snapshot.val();
                if(!user.fighter) user.fighter = "Коржик";
            } else {
                user = { nick, elo: 0, coins: 0, fighter: "Коржик" };
                await db.ref(`users/${nick}`).set(user);
            }
        } catch(e) {
            console.warn("База недоступна, играем локально.");
            user = { nick, elo: 0, coins: 0, fighter: "Коржик" };
        }
        
        localStorage.setItem('cc2_nick', nick);
        openMenu();
    });

    // Навигация
    document.getElementById('btn-train').addEventListener('click', () => startGame('train'));
    document.getElementById('btn-online').addEventListener('click', () => startGame('online'));
    
    document.getElementById('btn-shop').addEventListener('click', () => {
        document.getElementById('screen-menu').classList.add('hidden');
        document.getElementById('screen-shop').classList.remove('hidden');
        renderShop();
    });

    document.getElementById('btn-shop-back').addEventListener('click', openMenu);

    // 4. ЭКРАНЫ
    function openMenu() {
        state = 'MENU';
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById('ui-layer').classList.add('hidden');
        document.getElementById('screen-menu').classList.remove('hidden');
        
        document.getElementById('ui-nick').innerText = user.nick;
        document.getElementById('ui-coins').innerText = user.coins;
        document.getElementById('elo-display').innerText = user.elo;
    }

    function renderShop() {
        const grid = document.getElementById('shop-grid');
        grid.innerHTML = '';
        fighters.forEach(f => {
            const div = document.createElement('div');
            div.className = `fighter-card ${user.fighter === f.name ? 'active' : ''}`;
            div.innerHTML = `<b style="font-size: 18px">${f.name}</b><br><small style="color:#aaa">${f.desc}</small>`;
            div.addEventListener('click', () => {
                user.fighter = f.name;
                db.ref(`users/${user.nick}`).update({ fighter: f.name }).catch(()=>{});
                renderShop(); // Обновляем выделение
            });
            grid.appendChild(div);
        });
    }

    // 5. ИГРА И УПРАВЛЕНИЕ
    function startGame(selectedMode) {
        mode = selectedMode;
        score = { p: 0, o: 0 };
        state = 'PLAY';
        resize(); // Сброс позиций
        
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById('ui-layer').classList.remove('hidden');
        document.getElementById('score-view').innerText = "0 : 0";
        document.getElementById('ability-btn').classList.remove('cooldown');
        abilityCD = false;
    }

    // Управление битой (Тач)
    canvas.addEventListener('touchmove', (e) => {
        if (state !== 'PLAY' || p1.stunned > 0) return;
        e.preventDefault(); // Блокируем скролл только в игре
        const touch = e.touches[0];
        p1.x = Math.max(p1.r, Math.min(canvas.width - p1.r, touch.clientX));
        p1.y = Math.max(canvas.height/2 + p1.r, Math.min(canvas.height - p1.r, touch.clientY));
    }, {passive: false});

    // Кнопка способности
    document.getElementById('ability-btn').addEventListener('click', () => {
        if (abilityCD || state !== 'PLAY') return;
        abilityCD = true;
        const btn = document.getElementById('ability-btn');
        btn.classList.add('cooldown');

        // Применение скиллов
        if (user.fighter === "Коржик") p2.slow = 0.3; // Скольжение (замедление бота)
        if (user.fighter === "Гоня") p2.stunned = 60; // Стан 1 сек (60 кадров)
        if (user.fighter === "Горчица") { 
            document.getElementById('blind-fx').style.opacity = 1;
            setTimeout(() => document.getElementById('blind-fx').style.opacity = 0, 800);
            p2.stunned = 40;
        }
        if (user.fighter === "Компот") { puck.vy = -20; p2.y = 50; } // Откидывает шайбу и бота
        if (user.fighter === "Карамелька") p2.slow = 0.1;

        // Сброс эффектов
        setTimeout(() => { p2.slow = 1; }, 1500);
        // Откат скилла
        setTimeout(() => { abilityCD = false; btn.classList.remove('cooldown'); }, 4000);
    });

    // 6. ИГРОВОЙ ЦИКЛ
    function updatePhysics() {
        if (state !== 'PLAY') return;

        puck.x += puck.vx; puck.y += puck.vy;
        puck.vx *= 0.98; puck.vy *= 0.98; // Трение

        // Отскок от боковых стен
        if (puck.x < puck.r || puck.x > canvas.width - puck.r) {
            puck.vx *= -1; 
            puck.x = Math.max(puck.r, Math.min(canvas.width - puck.r, puck.x));
        }
        
        // Голы
        const goalW = canvas.width * 0.4;
        if (puck.y < 0) {
            if (puck.x > canvas.width/2 - goalW/2 && puck.x < canvas.width/2 + goalW/2) {
                score.p++; resetRound();
            } else { puck.vy *= -1; puck.y = puck.r; }
        }
        if (puck.y > canvas.height) {
            if (puck.x > canvas.width/2 - goalW/2 && puck.x < canvas.width/2 + goalW/2) {
                score.o++; resetRound();
            } else { puck.vy *= -1; puck.y = canvas.height - puck.r; }
        }

        checkCollision(p1, puck);
        checkCollision(p2, puck);

        // Бот ИИ
        if (p2.stunned > 0) {
            p2.stunned--;
        } else {
            let speed = (mode === 'train' ? 4 : 7) * p2.slow;
            if (puck.y < canvas.height/2) {
                if (p2.x < puck.x - 10) p2.x += speed;
                if (p2.x > puck.x + 10) p2.x -= speed;
                if (p2.y < puck.y - 40) p2.y += 3;
            } else {
                p2.y += (100 - p2.y) * 0.05; // Возврат домой
            }
        }
        
        // Ограничения бота
        p2.x = Math.max(p2.r, Math.min(canvas.width - p2.r, p2.x));
        p2.y = Math.max(p2.r, Math.min(canvas.height/2 - p2.r, p2.y));

        document.getElementById('score-view').innerText = `${score.o} : ${score.p}`;
        if (score.p >= 3 || score.o >= 3) finishGame();
    }

    function checkCollision(player, pk) {
        let dx = pk.x - player.x;
        let dy = pk.y - player.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < player.r + pk.r) {
            let angle = Math.atan2(dy, dx);
            let force = Math.max(10, Math.sqrt(pk.vx*pk.vx + pk.vy*pk.vy) * 1.2);
            pk.vx = Math.cos(angle) * force;
            pk.vy = Math.sin(angle) * force;
            
            // Выталкиваем шайбу из биты во избежание залипания
            pk.x = player.x + Math.cos(angle) * (player.r + pk.r);
            pk.y = player.y + Math.sin(angle) * (player.r + pk.r);
        }
    }

    function resetRound() {
        puck.x = canvas.width/2; puck.y = canvas.height/2;
        puck.vx = 0; puck.vy = 0;
    }

    function finishGame() {
        const win = score.p >= 3;
        if (mode === 'online') {
            let eloGain = win ? 25 : -10;
            user.elo = Math.max(0, user.elo + eloGain);
            user.coins += win ? 10 : 0;
            db.ref(`users/${user.nick}`).update({ elo: user.elo, coins: user.coins }).catch(()=>{});
        }
        alert(win ? "ПОБЕДА!" : "ПОРАЖЕНИЕ!");
        openMenu();
    }

    function draw() {
        ctx.clearRect(0,0, canvas.width, canvas.height);
        if (state !== 'PLAY') { requestAnimationFrame(draw); return; }

        // Линия по центру
        ctx.strokeStyle = "rgba(255,255,255,0.1)";
        ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(0, canvas.height/2); ctx.lineTo(canvas.width, canvas.height/2); ctx.stroke();

        // Ворота
        ctx.fillStyle = "#0f3460"; ctx.fillRect(canvas.width/2 - (canvas.width*0.4)/2, 0, canvas.width*0.4, 10);
        ctx.fillStyle = "#e94560"; ctx.fillRect(canvas.width/2 - (canvas.width*0.4)/2, canvas.height-10, canvas.width*0.4, 10);

        // Шайба
        ctx.fillStyle = "white";
        ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.r, 0, Math.PI*2); ctx.fill();

        // Игрок (Снизу)
        ctx.fillStyle = "#e94560";
        ctx.beginPath(); ctx.arc(p1.x, p1.y, p1.r, 0, Math.PI*2); ctx.fill();
        
        // Оппонент (Сверху)
        ctx.fillStyle = p2.stunned > 0 ? "yellow" : "#0f3460";
        ctx.beginPath(); ctx.arc(p2.x, p2.y, p2.r, 0, Math.PI*2); ctx.fill();

        updatePhysics();
        requestAnimationFrame(draw);
    }

    // Проверка автологина
    const savedNick = localStorage.getItem('cc2_nick');
    if (savedNick) {
        document.getElementById('nick-in').value = savedNick;
    }

    draw(); // Запуск рендера
</script>
</body>
</html>
