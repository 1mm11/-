<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dark Hockey Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; touch-action: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #0d1117; font-family: 'Oswald', sans-serif; color: white; }
        
        .screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; flex-direction: column; align-items: center; background: radial-gradient(circle, #1a2333 0%, #0d1117 100%); z-index: 10;}
        .screen.active { display: flex; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Панель ресурсов */
        .top-bar { position: absolute; top: 0; width: 100%; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.6); border-bottom: 2px solid #30363d; z-index: 100; }
        .stat-item { display: flex; align-items: center; gap: 5px; font-weight: 700; font-size: 16px; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); }
        .icon-elo { color: #f1c40f; } .icon-coins { color: #f39c12; } .icon-gems { color: #9b59b6; }

        /* Главные кнопки */
        .main-nav { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-around; align-items: center; padding: 0 10px; z-index: 100; }
        .btn { border: none; border-radius: 15px; font-family: 'Oswald'; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.1s; box-shadow: 0 4px 0 rgba(0,0,0,0.4); }
        .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.4); }

        .btn-side { width: 100px; height: 60px; font-size: 14px; background: #34495e; color: white; }
        .btn-play { width: 180px; height: 80px; font-size: 28px; background: linear-gradient(180deg, #f1c40f, #e67e22); color: #000; border: 3px solid #fff; }
        .btn-shop { background: #9b59b6; } .btn-mode { background: #3498db; }

        /* Магазин (Исправленный скролл) */
        .shop-scroller { width: 100%; display: flex; overflow-x: auto; padding: 20px; gap: 20px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        .shop-item { flex: 0 0 180px; background: rgba(255,255,255,0.05); border: 3px solid #30363d; border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center; scroll-snap-align: center; }
        .shop-item.selected { border-color: #f1c40f; background: rgba(241, 196, 15, 0.1); }
        .skin-circle { width: 70px; height: 70px; border-radius: 50%; border: 4px solid #fff; margin-bottom: 10px; box-shadow: 0 0 15px rgba(255,255,255,0.2); }
        .btn-buy { width: 100%; padding: 8px; margin-top: auto; background: #2ecc71; color: white; border-radius: 10px; font-size: 14px; }
        .btn-buy.owned { background: #3498db; } .btn-buy.active-skin { background: #f1c40f; color: #000; }

        /* Геймплей */
        #gameCanvas { background: #1a1f26; display: block; width: 100%; height: 100%; }
        #score-ui { position: absolute; top: 60px; width: 100%; text-align: center; font-size: 50px; font-weight: 900; pointer-events: none; z-index: 5; text-shadow: 2px 2px 0 #000; letter-spacing: 5px; }
        
        /* Ежедневная награда */
        .daily-box { margin-top: 80px; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 20px; border: 1px dashed #555; text-align: center; width: 80%; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="stat-item"><span class="icon-elo">⭐</span> <span id="ui-elo">0</span></div>
        <div class="stat-item"><span class="icon-coins">🪙</span> <span id="ui-coins">0</span></div>
        <div class="stat-item"><span class="icon-gems">💎</span> <span id="ui-gems">0</span></div>
    </div>

    <div id="screen-menu" class="screen active">
        <h1 style="font-size: 70px; margin-top: 40px; text-shadow: 4px 4px #000;">HOCKEY</h1>
        
        <div class="daily-box">
            <div id="daily-timer" style="font-size: 14px; color: #aaa;">ПРОВЕРКА...</div>
            <button id="btn-daily" class="btn" style="background: #2ecc71; padding: 10px 20px; margin-top: 5px;" onclick="claimDaily()">ПОДАРОК 100 🪙</button>
        </div>

        <div class="main-nav">
            <button class="btn btn-side btn-mode" onclick="showScreen('screen-modes')">РЕЖИМ:<br><span id="mode-label">ОНЛАЙН</span></button>
            <button class="btn btn-play" onclick="startMatchmaking()">ИГРАТЬ</button>
            <button class="btn btn-side btn-shop" onclick="showScreen('screen-shop')">МАГАЗИН</button>
        </div>
    </div>

    <div id="screen-shop" class="screen">
        <button class="btn" style="position: absolute; top: 70px; left: 20px; background: #555; padding: 5px 15px;" onclick="showScreen('screen-menu')">← НАЗАД</button>
        <h2 style="margin-top: 100px; font-size: 32px; color: #9b59b6;">МАГАЗИН СКИНОВ</h2>
        <div class="shop-scroller" id="shop-list">
            </div>
        <p style="color: #666; font-size: 12px;">Листай вправо →</p>
    </div>

    <div id="screen-modes" class="screen">
        <button class="btn" style="position: absolute; top: 70px; left: 20px; background: #555; padding: 5px 15px;" onclick="showScreen('screen-menu')">← НАЗАД</button>
        <h2 style="margin-top: 100px;">ВЫБЕРИ РЕЖИМ</h2>
        <button class="btn" style="width: 80%; padding: 20px; margin: 10px; background: #3498db;" onclick="selectMode('ONLINE')">ОНЛАЙН (3 ГОЛА)</button>
        <button class="btn" style="width: 80%; padding: 20px; margin: 10px; background: #e74c3c;" onclick="selectMode('BOTS')">БОТЫ (3 ГОЛА)</button>
        <button class="btn" style="width: 80%; padding: 20px; margin: 10px; background: #2ecc71;" onclick="selectMode('TRAINING')">ТРЕНИРОВКА (5 ГОЛОВ)</button>
    </div>

    <div id="screen-matchmaking" class="screen" style="justify-content: center;">
        <div style="font-size: 30px; margin-bottom: 20px;">ПОИСК ИГРОКА...</div>
        <div id="search-timer">0с</div>
        <button class="btn btn-side" style="margin-top: 40px; background: #e74c3c;" onclick="cancelSearch()">ОТМЕНА</button>
    </div>

    <div id="screen-game" class="screen" style="padding: 0;">
        <div id="score-ui">0 - 0</div>
        <canvas id="gameCanvas"></canvas>
    </div>

<script>
    // --- ДАННЫЕ ---
    let player = {
        elo: parseInt(localStorage.getItem('h_elo')) || 0,
        coins: parseInt(localStorage.getItem('h_coins')) || 0,
        gems: parseInt(localStorage.getItem('h_gems')) || 0,
        mode: 'ONLINE',
        lastDaily: parseInt(localStorage.getItem('h_daily')) || 0,
        ownedSkins: JSON.parse(localStorage.getItem('h_skins')) || ['default'],
        activeSkin: localStorage.getItem('h_active') || 'default'
    };

    const skins = {
        'default': { name: 'КЛАССИК', price: 0, color: '#e74c3c' },
        'neon': { name: 'НЕОН', price: 1500, color: '#2ecc71' },
        'ice': { name: 'ЛЕД', price: 3000, color: '#3498db' },
        'gold': { name: 'ЗОЛОТО', price: 7000, color: '#f1c40f' },
        'dark': { name: 'ТЬМА', price: 15000, color: '#9b59b6' }
    };

    function save() {
        localStorage.setItem('h_elo', player.elo);
        localStorage.setItem('h_coins', player.coins);
        localStorage.setItem('h_gems', player.gems);
        localStorage.setItem('h_daily', player.lastDaily);
        localStorage.setItem('h_skins', JSON.stringify(player.ownedSkins));
        localStorage.setItem('h_active', player.activeSkin);
        updateUI();
    }

    function updateUI() {
        document.getElementById('ui-elo').innerText = player.elo;
        document.getElementById('ui-coins').innerText = player.coins;
        document.getElementById('ui-gems').innerText = player.gems;
        document.getElementById('mode-label').innerText = player.mode === 'ONLINE' ? 'ОНЛАЙН' : (player.mode === 'BOTS' ? 'БОТЫ' : 'ТРЕНИРОВКА');
    }

    // --- МАГАЗИН ---
    function renderShop() {
        const list = document.getElementById('shop-list');
        list.innerHTML = '';
        Object.keys(skins).forEach(id => {
            const s = skins[id];
            const isOwned = player.ownedSkins.includes(id);
            const isActive = player.activeSkin === id;
            
            const item = document.createElement('div');
            item.className = `shop-item ${isActive ? 'selected' : ''}`;
            item.innerHTML = `
                <div class="skin-circle" style="background: ${s.color}"></div>
                <div style="font-weight: bold; margin-bottom: 5px;">${s.name}</div>
                <div style="font-size: 14px; color: #f39c12; margin-bottom: 10px;">${isOwned ? 'КУПЛЕНО' : '🪙 ' + s.price}</div>
                <button class="btn btn-buy ${isOwned ? (isActive ? 'active-skin' : 'owned') : ''}" 
                        onclick="${isOwned ? `equip('${id}')` : `buy('${id}')`}">
                    ${isActive ? 'ВЫБРАНО' : (isOwned ? 'ВЫБРАТЬ' : 'КУПИТЬ')}
                </button>
            `;
            list.appendChild(item);
        });
    }

    function buy(id) {
        if (player.coins >= skins[id].price) {
            player.coins -= skins[id].price;
            player.ownedSkins.push(id);
            save(); renderShop();
        } else alert("Недостаточно монет!");
    }
    function equip(id) { player.activeSkin = id; save(); renderShop(); }

    // --- ЕЖЕДНЕВКА ---
    function checkDaily() {
        const now = Date.now();
        const diff = now - player.lastDaily;
        const btn = document.getElementById('btn-daily');
        if (diff < 86400000) {
            btn.style.opacity = '0.5';
            btn.disabled = true;
            document.getElementById('daily-timer').innerText = "ЗАВТРА БУДЕТ НОВЫЙ";
        } else {
            btn.style.opacity = '1';
            btn.disabled = false;
            document.getElementById('daily-timer').innerText = "ПОДАРОК ГОТОВ!";
        }
    }

    function claimDaily() {
        player.coins += 100;
        player.lastDaily = Date.now();
        save(); checkDaily();
        alert("Получено 100 монет!");
    }

    // --- НАВИГАЦИЯ ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'screen-shop') renderShop();
        if(id === 'screen-menu') checkDaily();
    }

    function selectMode(m) { player.mode = m; save(); showScreen('screen-menu'); }

    let searchInt;
    function startMatchmaking() {
        showScreen('screen-matchmaking');
        let sec = 0;
        searchInt = setInterval(() => {
            sec++;
            document.getElementById('search-timer').innerText = sec + "с";
            if (sec >= (player.mode === 'ONLINE' ? 3 : 1)) {
                clearInterval(searchInt);
                initGame();
            }
        }, 1000);
    }
    function cancelSearch() { clearInterval(searchInt); showScreen('screen-menu'); }

    // --- ИГРА ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let gameActive = false;
    let cw, ch;
    let score = [0, 0];

    let puck = { x: 0, y: 0, vx: 0, vy: 0, r: 15 };
    let p1 = { x: 0, y: 0, r: 35, vx: 0, vy: 0, lastX: 0, lastY: 0 }; // Игрок
    let bot = { x: 0, y: 0, r: 35, speed: 0 }; // Бот

    function initGame() {
        cw = canvas.width = window.innerWidth;
        ch = canvas.height = window.innerHeight;
        score = [0, 0];
        resetPuck();
        showScreen('screen-game');
        gameActive = true;
        // Сложность бота зависит от ELO
        bot.speed = 3 + (player.elo / 1500); 
        if (bot.speed > 8) bot.speed = 8; // Макс скорость чтобы не был "читерским"
        requestAnimationFrame(update);
    }

    function resetPuck() {
        puck.x = cw / 2; puck.y = ch / 2;
        puck.vx = 0; puck.vy = 0;
        p1.x = cw / 2; p1.y = ch - 100;
        bot.x = cw / 2; bot.y = 100;
    }

    canvas.addEventListener('touchmove', e => {
        if (!gameActive) return;
        const t = e.touches[0];
        // Игрок может двигаться только на своей половине
        p1.x = t.clientX;
        p1.y = Math.max(ch / 2 + p1.r, Math.min(ch - p1.r, t.clientY));
        
        // Считаем скорость свайпа для силы удара
        p1.vx = p1.x - p1.lastX;
        p1.vy = p1.y - p1.lastY;
        p1.lastX = p1.x;
        p1.lastY = p1.y;
    });

    function update() {
        if (!gameActive) return;

        // Физика шайбы
        puck.x += puck.vx;
        puck.y += puck.vy;
        puck.vx *= 0.985; puck.vy *= 0.985; // Трение

        // Стены
        if (puck.x < puck.r || puck.x > cw - puck.r) {
            puck.vx *= -0.7;
            puck.x = puck.x < puck.r ? puck.r : cw - puck.r;
        }

        // БОТ: плавное движение, без телепортации
        let targetX = puck.x;
        // Если шайба на стороне бота, он атакует
        if (puck.y < ch / 2) {
            let dx = targetX - bot.x;
            bot.x += Math.sign(dx) * Math.min(Math.abs(dx), bot.speed);
            
            let dy = (puck.y - 50) - bot.y;
            bot.y += Math.sign(dy) * Math.min(Math.abs(dy), bot.speed);
        } else {
            // Возврат к воротам
            let dx = (cw / 2) - bot.x;
            bot.x += Math.sign(dx) * Math.min(Math.abs(dx), bot.speed * 0.5);
            bot.y += (100 - bot.y) * 0.1;
        }

        // Столкновения (Игрок)
        handleCol(p1, true);
        handleCol(bot, false);

        // Голы
        if (puck.y < 0 || puck.y > ch) {
            const goalArea = (puck.x > cw/2 - 70 && puck.x < cw/2 + 70);
            if (goalArea) {
                if (puck.y < 0) score[0]++; else score[1]++;
                document.getElementById('score-ui').innerText = `${score[1]} - ${score[0]}`;
                
                let limit = player.mode === 'TRAINING' ? 5 : 3;
                if (score[0] >= limit || score[1] >= limit) {
                    endGame(score[0] > score[1]);
                    return;
                }
                resetPuck();
            } else {
                puck.vy *= -0.8;
                puck.y = puck.y < 0 ? puck.r : ch - puck.r;
            }
        }

        draw();
        requestAnimationFrame(update);
    }

    function handleCol(m, isPlayer) {
        let dx = puck.x - m.x;
        let dy = puck.y - m.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < puck.r + m.r) {
            let angle = Math.atan2(dy, dx);
            // Сила удара: база + скорость движения руки
            let force = isPlayer ? (8 + Math.sqrt(m.vx**2 + m.vy**2) * 0.5) : 10;
            if (force > 25) force = 25; // Ограничение силы
            
            puck.vx = Math.cos(angle) * force;
            puck.vy = Math.sin(angle) * force;
            
            // Выталкивание
            puck.x = m.x + Math.cos(angle) * (puck.r + m.r);
            puck.y = m.y + Math.sin(angle) * (puck.r + m.r);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, cw, ch);
        
        // Разметка поля
        ctx.strokeStyle = "rgba(255,255,255,0.1)"; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(0, ch/2); ctx.lineTo(cw, ch/2); ctx.stroke();
        ctx.beginPath(); ctx.arc(cw/2, ch/2, 60, 0, Math.PI*2); ctx.stroke();
        
        // Ворота
        ctx.fillStyle = "#3498db"; ctx.fillRect(cw/2 - 70, 0, 140, 10);
        ctx.fillStyle = "#e74c3c"; ctx.fillRect(cw/2 - 70, ch-10, 140, 10);

        // Бот
        ctx.fillStyle = "#3498db"; ctx.beginPath();
        ctx.arc(bot.x, bot.y, bot.r, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "white"; ctx.stroke();

        // Игрок
        ctx.fillStyle = skins[player.activeSkin].color; ctx.beginPath();
        ctx.arc(p1.x, p1.y, p1.r, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "white"; ctx.stroke();

        // Шайба
        ctx.fillStyle = "white"; ctx.shadowBlur = 10; ctx.shadowColor = "white";
        ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.r, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
    }

    function endGame(win) {
        gameActive = false;
        if (player.mode !== 'TRAINING') {
            if (win) {
                // Твоя формула ELO
                let gain = 0;
                if(player.elo < 1000) gain = 25;
                else if(player.elo < 1500) gain = 15;
                else if(player.elo < 3000) gain = 10;
                else gain = 5;
                
                player.elo += gain;
                player.coins += 100;
                player.gems += 1;
                alert(`ПОБЕДА! +${gain} ELO`);
            } else {
                alert("ПОРАЖЕНИЕ!");
            }
        } else alert("ТРЕНИРОВКА ОКОНЧЕНА");
        save();
        showScreen('screen-menu');
    }

    updateUI();
    checkDaily();
</script>
</body>
</html>
