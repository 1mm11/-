<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CC 2: Counter Cat Online</title>
    <style>
        :root { --primary: #e94560; --bg: #1a1a2e; --panel: #16213e; --accent: #0f3460; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; background: var(--bg); overflow: hidden; font-family: sans-serif; color: white; }

        /* Слои */
        #gameCanvas { position: absolute; top: 0; left: 0; z-index: 1; width: 100%; height: 100%; }
        #ui-layer { position: absolute; top: 0; left: 0; z-index: 10; width: 100%; height: 100%; pointer-events: none; }
        .interactive { pointer-events: auto; } /* Для кнопок поверх канваса */

        /* Верхняя панель */
        #top-bar { position: absolute; top: 0; width: 100%; padding: 10px; background: rgba(0,0,0,0.7); display: flex; justify-content: space-between; align-items: center; z-index: 20; }
        .stats-group { display: flex; flex-direction: column; font-size: 14px; }
        #elo-display { color: #f9a826; font-weight: bold; text-decoration: underline; cursor: pointer; }

        /* Меню */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .hidden { display: none !important; }

        .btn { width: 80%; padding: 18px; margin: 10px 0; background: var(--accent); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; box-shadow: 0 4px #05162d; transition: 0.1s; }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px #05162d; }
        .btn-main { background: var(--primary); box-shadow: 0 4px #a02d40; }

        /* Магазин/Выбор */
        #shop-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 90%; margin-bottom: 20px; }
        .fighter-card { background: var(--panel); padding: 10px; border-radius: 10px; text-align: center; border: 2px solid transparent; }
        .fighter-card.active { border-color: var(--primary); }

        /* Игра */
        #ability-btn { position: absolute; bottom: 40px; right: 20px; width: 85px; height: 85px; background: var(--primary); border-radius: 50%; border: 4px solid white; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 50; box-shadow: 0 0 20px rgba(233,69,96,0.5); }
        #ability-btn.cooldown { background: #444; filter: grayscale(1); }
        #score-view { position: absolute; top: 50%; width: 100%; text-align: center; font-size: 60px; font-weight: 900; opacity: 0.15; transform: translateY(-50%); }
        #blind-fx { position: absolute; top:0; left:0; width:100%; height:100%; background:black; opacity:0; pointer-events:none; z-index: 200; }
    </style>
</head>
<body>

    <div id="blind-fx"></div>

    <div id="ui-layer">
        <div id="top-bar" class="interactive">
            <div class="stats-group">
                <b id="ui-nick">Загрузка...</b>
                <span>💰 <span id="ui-coins">0</span></span>
            </div>
            <div class="stats-group" style="align-items: flex-end;">
                <span>ELO</span>
                <span id="elo-display">0</span>
            </div>
        </div>

        <div id="score-view">0 : 0</div>
        
        <div id="ability-btn" class="interactive hidden">⚡</div>
    </div>

    <div id="screen-auth" class="screen">
        <h1 style="margin-bottom: 20px;">Counter Cat 2</h1>
        <input type="text" id="nick-in" placeholder="Твой ник" style="width:80%; padding:15px; border-radius:10px; border:none; margin-bottom:20px; text-align:center; font-size:18px;">
        <button class="btn btn-main interactive" id="btn-do-login">Войти в игру</button>
    </div>

    <div id="screen-menu" class="screen hidden">
        <h2 style="margin-bottom:30px; font-size:40px; color:var(--primary)">CC 2</h2>
        <button class="btn btn-main interactive" onclick="startGame('train')">Тренировка</button>
        <button class="btn interactive" onclick="startGame('online')">Онлайн 1x1</button>
        <button class="btn interactive" onclick="showShop()">Бойцы / Магазин</button>
        <button class="btn interactive" onclick="alert('English / Ukrainian')">Язык: RU</button>
    </div>

    <div id="screen-shop" class="screen hidden">
        <h3>Выбери кота</h3>
        <div id="shop-grid" class="interactive"></div>
        <button class="btn interactive" onclick="hideShop()">Назад</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, get, update, child, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCuXDgwCpLzJl_i6NIgwhA1nanVzTs7fnM",
        authDomain: "three-cats-online.firebaseapp.com",
        projectId: "three-cats-online",
        storageBucket: "three-cats-online.firebasestorage.app",
        messagingSenderId: "1965511705",
        appId: "1:1965511705:web:86a405ef672ae7bfa18688"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ДАННЫЕ ИГРОКА
    let user = { nick: "", elo: 0, coins: 0, fighter: "Коржик" };
    const fighters = [
        { name: "Коржик", power: "Вода (Скольжение)" },
        { name: "Сажик", power: "Туман (Отталкивание)" },
        { name: "Гоня", power: "Фейерверк (Стан)" },
        { name: "Карамелька", power: "Леденец (Липкость)" },
        { name: "Шуруп", power: "Робот (Выстрел)" },
        { name: "Изюм", power: "Краска (Замедление)" },
        { name: "Горчица", power: "Хот-дог (Темнота)" },
        { name: "Компот", power: "Кастрюля (Взрыв)" }
    ];

    // ИГРОВЫЕ ПЕРЕМЕННЫЕ
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let state = 'AUTH'; 
    let mode = 'train';
    let score = { p: 0, o: 0 };
    let abilityCD = false;

    // ОБЪЕКТЫ
    const puck = { x: 0, y: 0, vx: 0, vy: 0, r: 15 };
    const p1 = { x: 0, y: 0, r: 35, stunned: 0, slow: 1 };
    const p2 = { x: 0, y: 0, r: 35, stunned: 0, slow: 1 };

    function initPositions() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        puck.x = canvas.width/2; puck.y = canvas.height/2;
        puck.vx = 0; puck.vy = 0;
        p1.x = canvas.width/2; p1.y = canvas.height - 100;
        p2.x = canvas.width/2; p2.y = 100;
    }
    window.addEventListener('resize', initPositions);
    initPositions();

    // AUTH ЛОГИКА
    document.getElementById('btn-do-login').onclick = async () => {
        const nick = document.getElementById('nick-in').value.trim();
        if (!nick) return alert("Введите ник!");
        
        const snapshot = await get(ref(db, `users/${nick}`));
        if (snapshot.exists()) {
            user = snapshot.val();
        } else {
            user = { nick, elo: 0, coins: 0, fighter: "Коржик" };
            await set(ref(db, `users/${nick}`), user);
        }
        localStorage.setItem('cc2_nick', nick);
        showMenu();
    };

    function showMenu() {
        state = 'MENU';
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
        document.getElementById('screen-menu').classList.remove('hidden');
        document.getElementById('ui-nick').innerText = user.nick;
        document.getElementById('ui-coins').innerText = user.coins;
        document.getElementById('elo-display').innerText = user.elo;
        document.getElementById('ability-btn').classList.add('hidden');
    }

    // МАГАЗИН
    window.showShop = () => {
        document.getElementById('screen-shop').classList.remove('hidden');
        const grid = document.getElementById('shop-grid');
        grid.innerHTML = '';
        fighters.forEach(f => {
            const div = document.createElement('div');
            div.className = `fighter-card ${user.fighter === f.name ? 'active' : ''}`;
            div.innerHTML = `<b>${f.name}</b><br><small>${f.power}</small>`;
            div.onclick = () => {
                user.fighter = f.name;
                update(ref(db, `users/${user.nick}`), { fighter: f.name });
                showShop(); // Refresh
            };
            grid.appendChild(div);
        });
    };
    window.hideShop = () => document.getElementById('screen-shop').classList.add('hidden');

    // ЛОГИКА ИГРЫ
    window.startGame = (m) => {
        mode = m;
        score = { p: 0, o: 0 };
        state = 'PLAY';
        initPositions();
        document.getElementById('screen-menu').classList.add('hidden');
        document.getElementById('ability-btn').classList.remove('hidden');
        document.getElementById('score-view').innerText = "0 : 0";
    };

    // Управление
    canvas.addEventListener('touchmove', (e) => {
        if (state !== 'PLAY') return;
        e.preventDefault();
        const t = e.touches[0];
        if (p1.stunned > 0) return;
        p1.x = Math.max(p1.r, Math.min(canvas.width - p1.r, t.clientX));
        p1.y = Math.max(canvas.height/2 + p1.r, Math.min(canvas.height - p1.r, t.clientY));
    }, {passive: false});

    // Способность
    document.getElementById('ability-btn').onclick = () => {
        if (abilityCD || state !== 'PLAY') return;
        abilityCD = true;
        const btn = document.getElementById('ability-btn');
        btn.classList.add('cooldown');

        // Эффект на врага
        if (user.fighter === "Коржик") p2.slow = 0.3;
        if (user.fighter === "Гоня") p2.stunned = 60;
        if (user.fighter === "Горчица") { 
            document.getElementById('blind-fx').style.opacity = 1;
            setTimeout(() => document.getElementById('blind-fx').style.opacity = 0, 600);
        }
        if (user.fighter === "Компот") { puck.vy = -15; p2.y = 50; }

        setTimeout(() => { p2.slow = 1; }, 1000);
        setTimeout(() => { abilityCD = false; btn.classList.remove('cooldown'); }, 5000);
    };

    function updatePhysics() {
        if (state !== 'PLAY') return;

        puck.x += puck.vx; puck.y += puck.vy;
        puck.vx *= 0.98; puck.vy *= 0.98;

        // Стены
        if (puck.x < puck.r || puck.x > canvas.width - puck.r) puck.vx *= -1;
        
        // Голы
        const gw = canvas.width * 0.4;
        if (puck.y < 0) {
            if (puck.x > canvas.width/2 - gw/2 && puck.x < canvas.width/2 + gw/2) {
                score.p++; resetRound();
            } else { puck.vy *= -1; puck.y = puck.r; }
        }
        if (puck.y > canvas.height) {
            if (puck.x > canvas.width/2 - gw/2 && puck.x < canvas.width/2 + gw/2) {
                score.o++; resetRound();
            } else { puck.vy *= -1; puck.y = canvas.height - puck.r; }
        }

        // Столкновения
        checkColl(p1, puck);
        checkColl(p2, puck);

        // Бот
        if (p2.stunned > 0) p2.stunned--;
        else {
            let speed = (mode === 'train' ? 4 : 7) * p2.slow;
            if (puck.y < canvas.height/2) {
                if (p2.x < puck.x) p2.x += speed;
                if (p2.x > puck.x) p2.x -= speed;
                if (p2.y < puck.y - 40) p2.y += 2;
            } else {
                p2.y += (100 - p2.y) * 0.05;
            }
        }
        
        document.getElementById('score-view').innerText = `${score.o} : ${score.p}`;
        if (score.p >= 3 || score.o >= 3) finishGame();
    }

    function checkColl(p, pk) {
        let dx = pk.x - p.x;
        let dy = pk.y - p.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < p.r + pk.r) {
            let ang = Math.atan2(dy, dx);
            pk.vx = Math.cos(ang) * 10;
            pk.vy = Math.sin(ang) * 10;
        }
    }

    function resetRound() {
        puck.x = canvas.width/2; puck.y = canvas.height/2;
        puck.vx = 0; puck.vy = 0;
    }

    async function finishGame() {
        state = 'MENU';
        const win = score.p >= 3;
        if (mode === 'online') {
            let eloGain = win ? 25 : -10;
            user.elo = Math.max(0, user.elo + eloGain);
            user.coins += win ? 10 : 0;
            await update(ref(db, `users/${user.nick}`), { elo: user.elo, coins: user.coins });
        }
        alert(win ? "Победа!" : "Поражение");
        showMenu();
    }

    function draw() {
        ctx.clearRect(0,0, canvas.width, canvas.height);
        if (state !== 'PLAY') { requestAnimationFrame(draw); return; }

        // Поле
        ctx.strokeStyle = "rgba(255,255,255,0.1)";
        ctx.lineWidth = 5;
        ctx.strokeRect(canvas.width/2 - (canvas.width*0.4)/2, 0, canvas.width*0.4, 10);
        ctx.strokeRect(canvas.width/2 - (canvas.width*0.4)/2, canvas.height-10, canvas.width*0.4, 10);

        // Шайба
        ctx.fillStyle = "white";
        ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.r, 0, Math.PI*2); ctx.fill();

        // Игроки
        ctx.fillStyle = "#e94560";
        ctx.beginPath(); ctx.arc(p1.x, p1.y, p1.r, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#0f3460";
        ctx.beginPath(); ctx.arc(p2.x, p2.y, p2.r, 0, Math.PI*2); ctx.fill();

        updatePhysics();
        requestAnimationFrame(draw);
    }

    // Авто-логин
    const saved = localStorage.getItem('cc2_nick');
    if (saved) {
        document.getElementById('nick-in').value = saved;
        // Можно автоматом жать логин
    } else {
        document.getElementById('screen-auth').classList.remove('hidden');
    }

    draw();
</script>
</body>
</html>
